<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Form</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; padding: 16px; }
  .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 480px; margin: 0 auto; overflow: hidden; }
  .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 24px 20px; text-align: center; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .shop-section { padding: 16px 20px 0; }
  .shop-section label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
  .shop-section input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
  .shop-section input:focus { border-color: #1a73e8; }
  .config-banner { margin: 12px 20px 0; background: #fff8e1; border: 1.5px solid #f9a825; border-radius: 10px; padding: 10px 14px; font-size: 12.5px; color: #795548; }
  .config-banner input { width: 100%; margin-top: 6px; padding: 7px 10px; border: 1.5px solid #f9a825; border-radius: 6px; font-size: 12px; outline: none; color: #333; }
  .items { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .item { border: 1.5px solid #e8edf2; border-radius: 12px; padding: 14px; transition: border 0.2s; }
  .item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .item-name { font-size: 14px; font-weight: 600; color: #222; max-width: 65%; line-height: 1.3; }
  .item-price { font-size: 13px; color: #1a73e8; font-weight: 700; background: #e8f0fe; padding: 3px 8px; border-radius: 20px; }
  .item-bottom { display: flex; align-items: center; justify-content: space-between; }
  .qty-controls { display: flex; align-items: center; gap: 8px; }
  .qty-btn { width: 30px; height: 30px; border: none; border-radius: 50%; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; line-height: 1; }
  .minus { background: #e8edf2; color: #555; }
  .minus:hover { background: #d0d7e0; }
  .plus { background: #1a73e8; color: white; }
  .plus:hover { background: #1558b0; }
  .qty-input { width: 40px; text-align: center; border: 1.5px solid #ddd; border-radius: 6px; font-size: 15px; font-weight: 600; padding: 4px; outline: none; }
  .subtotal { font-size: 13px; color: #555; font-weight: 600; }
  .subtotal span { color: #222; }
  .divider { height: 1px; background: #e8edf2; margin: 0 20px; }
  .total-section { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .total-label { font-size: 16px; font-weight: 700; color: #222; }
  .total-amount { font-size: 22px; font-weight: 800; color: #1a73e8; }
  .submit-btn { display: block; width: calc(100% - 40px); margin: 0 20px 20px; padding: 14px; background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .submit-btn:hover:not(:disabled) { opacity: 0.92; }
  .submit-btn:active:not(:disabled) { transform: scale(0.98); }
  .success { display: none; padding: 30px 20px; text-align: center; }
  .success-icon { font-size: 56px; margin-bottom: 12px; }
  .success h2 { color: #1a73e8; margin-bottom: 8px; }
  .success p { color: #555; font-size: 14px; line-height: 1.6; }
  .reset-btn { margin-top: 16px; padding: 10px 24px; background: #e8f0fe; color: #1a73e8; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .error-msg { margin: 0 20px 12px; background: #fdecea; border: 1.5px solid #f44336; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #c62828; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>📋 Place Your Order</h1>
    <p>Select quantities and submit your order</p>
  </div>

  <div class="config-banner">
    ⚙️ <strong>One-time setup:</strong> Paste your Google Apps Script URL below
    <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/YOUR_SCRIPT_URL/exec" />
  </div>

  <div class="shop-section" style="padding-top:14px;">
    <label>Shop / Owner Name</label>
    <input type="text" id="shopName" placeholder="e.g. Raju General Store" />
  </div>
  <div class="shop-section" style="padding-top:10px; padding-bottom:4px;">
    <label>Phone Number</label>
    <input type="tel" id="phone" placeholder="e.g. 9876543210" />
  </div>

  <div class="items" id="itemsContainer"></div>

  <div class="divider"></div>
  <div class="total-section">
    <span class="total-label">Total Amount</span>
    <span class="total-amount" id="totalAmount">₹0</span>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <button class="submit-btn" id="submitBtn" onclick="submitOrder()">Submit Order</button>

  <div class="success" id="successMsg">
    <div class="success-icon">✅</div>
    <h2>Order Saved!</h2>
    <p id="successDetails"></p>
    <p style="margin-top:10px; font-size:12px; color:#888;">Order has been recorded in Google Sheets</p>
    <button class="reset-btn" onclick="resetForm()">New Order</button>
  </div>
</div>

<script>
  const skus = [
    { name: "Smith and Jones Ginger Garlic Paste", price: 5 },
    { name: "Smith n Jones Masala Noodles", price: 5 },
    { name: "Chings Schezwan Chutney", price: 85 },
    { name: "Tata Salt 1Kg", price: 30 },
  ];

  const container = document.getElementById('itemsContainer');

  skus.forEach((sku, i) => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <div class="item-top">
        <div class="item-name">${sku.name}</div>
        <div class="item-price">₹${sku.price}</div>
      </div>
      <div class="item-bottom">
        <div class="qty-controls">
          <button class="qty-btn minus" onclick="changeQty(${i}, -1)">−</button>
          <input class="qty-input" type="number" id="qty${i}" value="0" min="0" max="999" oninput="updateItem(${i})" />
          <button class="qty-btn plus" onclick="changeQty(${i}, 1)">+</button>
        </div>
        <div class="subtotal">Subtotal: <span id="sub${i}">₹0</span></div>
      </div>
    `;
    container.appendChild(div);
  });

  function getQty(i) { return Math.max(0, parseInt(document.getElementById('qty'+i).value) || 0); }

  function changeQty(i, delta) {
    const inp = document.getElementById('qty'+i);
    inp.value = Math.max(0, (parseInt(inp.value)||0) + delta);
    updateItem(i);
  }

  function updateItem(i) {
    const q = getQty(i);
    document.getElementById('sub'+i).textContent = '₹' + (q * skus[i].price);
    updateTotal();
  }

  function updateTotal() {
    let total = 0;
    skus.forEach((sku, i) => total += getQty(i) * sku.price);
    document.getElementById('totalAmount').textContent = '₹' + total;
  }

  async function submitOrder() {
    const scriptUrl = document.getElementById('scriptUrl').value.trim();
    const shop = document.getElementById('shopName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const errEl = document.getElementById('errorMsg');
    errEl.style.display = 'none';

    if (!scriptUrl || !scriptUrl.includes('script.google.com')) {
      showError('Please paste your Google Apps Script URL in the setup field above.'); return;
    }
    if (!shop) { showError('Please enter the shop name.'); return; }

    let total = 0;
    let itemLines = [];
    skus.forEach((sku, i) => {
      const q = getQty(i);
      if (q > 0) { itemLines.push(`${sku.name} x${q} = ₹${q * sku.price}`); total += q * sku.price; }
    });
    if (itemLines.length === 0) { showError('Please select at least one item.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    const payload = {
      shop, phone,
      items: itemLines.join(' | '),
      total: '₹' + total
    };

    try {
      await fetch(scriptUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      // no-cors won't give us response, assume success
      const details = `<strong>${shop}</strong>${phone ? ' · ' + phone : ''}<br><br>${itemLines.join('<br>')}<br><br><strong>Total: ₹${total}</strong>`;
      document.getElementById('successDetails').innerHTML = details;
      document.querySelectorAll('.card > *:not(#successMsg)').forEach(el => el.style.display = 'none');
      document.getElementById('successMsg').style.display = 'block';
    } catch (err) {
      showError('Could not connect. Check your Script URL and internet connection.');
      btn.disabled = false;
      btn.textContent = 'Submit Order';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function resetForm() {
    document.getElementById('shopName').value = '';
    document.getElementById('phone').value = '';
    skus.forEach((_, i) => { document.getElementById('qty'+i).value = 0; updateItem(i); });
    document.querySelectorAll('.card > *:not(#successMsg)').forEach(el => el.style.display = '');
    document.getElementById('successMsg').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Submit Order';
    document.getElementById('errorMsg').style.display = 'none';
  }
</script>
</body>
</html>
