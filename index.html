<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Form</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

  .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 12px 16px; flex-shrink: 0; }
  .header h1 { font-size: 17px; font-weight: 700; }
  .header p { font-size: 11px; opacity: 0.8; }

  .shop-bar { background: white; padding: 10px 12px; display: flex; gap: 8px; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
  .shop-bar input { flex: 1; padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; min-width: 0; }
  .shop-bar input:focus { border-color: #1a73e8; }

  .error-bar { background: #fdecea; color: #c62828; padding: 8px 14px; font-size: 13px; display: none; flex-shrink: 0; }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* Brand sidebar */
  .brands { width: 120px; background: white; border-right: 1px solid #e8edf2; overflow-y: auto; flex-shrink: 0; }
  .brand-tab { padding: 13px 10px; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; border-left: 3px solid transparent; line-height: 1.35; transition: all 0.15s; word-break: break-word; }
  .brand-tab:hover { background: #f5f8ff; color: #1a73e8; }
  .brand-tab.active { background: #e8f0fe; color: #1a73e8; border-left-color: #1a73e8; }
  .brand-badge { display: inline-block; background: #1a73e8; color: white; border-radius: 10px; font-size: 10px; padding: 1px 5px; margin-top: 3px; }
  .brand-tab.active .brand-badge { background: #0d47a1; }

  /* SKU panel */
  .skus { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }

  .sku-card { background: white; border-radius: 10px; padding: 11px 12px; border: 1.5px solid #e8edf2; transition: border 0.15s, background 0.15s; }
  .sku-card.has-qty { border-color: #1a73e8; background: #f5f9ff; }
  .sku-name { font-size: 13px; font-weight: 600; color: #1a1a1a; line-height: 1.35; margin-bottom: 2px; }
  .sku-meta { font-size: 10.5px; color: #aaa; margin-bottom: 8px; }
  .sku-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .sku-price strong { color: #1a73e8; font-size: 14px; }
  .sku-price .mrp { color: #999; font-size: 11px; }
  .sku-subtotal { font-size: 11.5px; color: #555; font-weight: 600; }

  .qty-controls { display: flex; align-items: center; gap: 6px; }
  .qty-btn { width: 28px; height: 28px; border: none; border-radius: 50%; font-size: 17px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; flex-shrink: 0; }
  .minus { background: #e8edf2; color: #555; }
  .plus  { background: #1a73e8; color: white; }
  .qty-input { width: 36px; text-align: center; border: 1.5px solid #ddd; border-radius: 6px; font-size: 14px; font-weight: 600; padding: 3px; outline: none; }

  /* Bottom bar */
  .bottom-bar { background: white; border-top: 1px solid #e8edf2; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-shrink: 0; }
  .total-wrap { line-height: 1.3; }
  .total-wrap span { font-size: 12px; color: #888; display: block; }
  .total-wrap strong { font-size: 20px; color: #1a73e8; font-weight: 800; }
  .items-count { font-size: 11px; color: #aaa; }
  .submit-btn { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; border: none; padding: 12px 18px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

  /* Loading */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: #888; }
  .spinner { width: 36px; height: 36px; border: 4px solid #e0e0e0; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Success */
  .success-overlay { display: none; position: fixed; inset: 0; background: white; z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 28px; text-align: center; }
  .success-overlay.show { display: flex; }
  .s-icon { font-size: 58px; margin-bottom: 14px; }
  .success-overlay h2 { color: #1a73e8; margin-bottom: 10px; }
  .success-overlay p { color: #555; font-size: 13.5px; line-height: 1.7; }
  .reset-btn { margin-top: 20px; padding: 12px 28px; background: #e8f0fe; color: #1a73e8; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 Place Your Order</h1>
  <p>Select products and submit</p>
</div>

<div class="shop-bar">
  <input type="text" id="shopName" placeholder="Shop / Owner Name" />
  <input type="tel"  id="phone"    placeholder="Phone" style="max-width:130px;" />
</div>

<div class="error-bar" id="errorBar"></div>

<div class="main" id="mainArea">
  <div class="loading" id="loadingEl">
    <div class="spinner"></div>
    <span>Loading products...</span>
  </div>
</div>

<div class="bottom-bar">
  <div class="total-wrap">
    <span>Total Amount</span>
    <strong id="totalAmt">₹0.00</strong>
    <div class="items-count" id="itemsCount"></div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitOrder()">Submit Order</button>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="s-icon">✅</div>
  <h2>Order Saved!</h2>
  <p id="successDetails"></p>
  <p style="margin-top:10px;font-size:12px;color:#999;">Saved to Google Sheets</p>
  <button class="reset-btn" onclick="resetForm()">New Order</button>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwRWoJnhWxlMuj7dOB-n2ymGjyBsEl6PRhCNhCJvJgXt6hxtdm2vRWV2oXQzoCAiBkk/exec';

  let products = [];
  let quantities = {};
  let activeBrand = null;

  async function loadProducts() {
    try {
      const res = await fetch(SCRIPT_URL + '?action=getProducts');
      const data = await res.json();
      products = data.products;
      renderUI();
    } catch(e) {
      document.getElementById('loadingEl').innerHTML =
        '<span style="color:#c62828;text-align:center;padding:20px;">❌ Failed to load products.<br>Check internet and try refreshing.</span>';
    }
  }

  function getBrands() { return [...new Set(products.map(p => p.brand))]; }

  function brandItemCount(brand) {
    return products.filter(p => p.brand === brand && (quantities[p.skuCode] || 0) > 0).length;
  }

  function renderUI() {
    const brands = getBrands();
    activeBrand = brands[0];
    const main = document.getElementById('mainArea');
    main.innerHTML = '<div class="brands" id="brandList"></div><div class="skus" id="skuList"></div>';
    renderBrands();
    renderSKUs();
  }

  function renderBrands() {
    const brands = getBrands();
    const bl = document.getElementById('brandList');
    bl.innerHTML = '';
    brands.forEach(brand => {
      const cnt = brandItemCount(brand);
      const div = document.createElement('div');
      div.className = 'brand-tab' + (brand === activeBrand ? ' active' : '');
      div.innerHTML = brand + (cnt > 0 ? `<br><span class="brand-badge">${cnt} item${cnt>1?'s':''}</span>` : '');
      div.onclick = () => { activeBrand = brand; renderBrands(); renderSKUs(); };
      bl.appendChild(div);
    });
  }

  function renderSKUs() {
    const sl = document.getElementById('skuList');
    sl.innerHTML = '';
    products.filter(p => p.brand === activeBrand).forEach(p => {
      const qty = quantities[p.skuCode] || 0;
      const sub = qty > 0 ? '₹' + (qty * p.price).toFixed(2) : '';
      const div = document.createElement('div');
      div.className = 'sku-card' + (qty > 0 ? ' has-qty' : '');
      div.id = 'card-' + p.skuCode;
      div.innerHTML = `
        <div class="sku-name">${p.description}</div>
        <div class="sku-meta">${p.skuCode} &nbsp;·&nbsp; UOM: ${p.uom}</div>
        <div class="sku-bottom">
          <div class="sku-price">
            <div><span style="font-size:11px;color:#888;">Price: </span><strong>₹${p.price.toFixed(2)}</strong></div>
            <div><span style="font-size:11px;color:#888;">MRP: </span><span style="font-size:13px;font-weight:600;color:#e65100;">₹${isNaN(p.mrp) ? 'N/A' : p.mrp.toLocaleString('en-IN')}</span></div>
            ${sub ? `<div class="sku-subtotal">Subtotal: ${sub}</div>` : ''}
          </div>
          <div class="qty-controls">
            <button class="qty-btn minus" onclick="changeQty('${p.skuCode}',-1)">−</button>
            <input class="qty-input" type="number" id="qty-${p.skuCode}" value="${qty}" min="0"
              oninput="setQty('${p.skuCode}',this.value)" />
            <button class="qty-btn plus" onclick="changeQty('${p.skuCode}',1)">+</button>
          </div>
        </div>`;
      sl.appendChild(div);
    });
  }

  function changeQty(code, delta) {
    const inp = document.getElementById('qty-' + code);
    const v = Math.max(0, (parseInt(inp.value)||0) + delta);
    inp.value = v;
    setQty(code, v);
  }

  function setQty(code, val) {
    const qty = Math.max(0, parseInt(val)||0);
    quantities[code] = qty;
    // update card style + subtotal inline
    const card = document.getElementById('card-' + code);
    if (card) {
      card.className = 'sku-card' + (qty > 0 ? ' has-qty' : '');
      const p = products.find(x => x.skuCode === code);
      const subEl = card.querySelector('.sku-subtotal');
      if (qty > 0) {
        const subText = 'Subtotal: ₹' + (qty * p.price).toFixed(2);
        if (subEl) subEl.textContent = subText;
        else {
          const priceDiv = card.querySelector('.sku-price');
          const s = document.createElement('div');
          s.className = 'sku-subtotal'; s.textContent = subText;
          priceDiv.appendChild(s);
        }
      } else if (subEl) subEl.remove();
    }
    updateTotal();
    renderBrands(); // refresh badges
  }

  function updateTotal() {
    let total = 0, count = 0;
    products.forEach(p => {
      const q = quantities[p.skuCode] || 0;
      if (q > 0) { total += q * p.price; count += q; }
    });
    document.getElementById('totalAmt').textContent = '₹' + total.toFixed(2);
    document.getElementById('itemsCount').textContent = count > 0 ? count + ' unit' + (count>1?'s':'') + ' selected' : '';
  }

  function getLocation() {
    return new Promise(resolve => {
      if (!navigator.geolocation) return resolve({lat:null,lng:null});
      navigator.geolocation.getCurrentPosition(
        p => resolve({lat:p.coords.latitude, lng:p.coords.longitude}),
        () => resolve({lat:null,lng:null}),
        {timeout:6000}
      );
    });
  }

  async function submitOrder() {
    const shop  = document.getElementById('shopName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if (!shop) { showError('Please enter shop name.'); return; }
    const lines = []; let total = 0;
    products.forEach(p => {
      const q = quantities[p.skuCode]||0;
      if (q > 0) { lines.push(`${p.description} x${q} = ₹${(q*p.price).toFixed(2)}`); total += q*p.price; }
    });
    if (!lines.length) { showError('Please select at least one item.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Getting location...';
    const {lat,lng} = await getLocation();
    btn.textContent = 'Submitting...';

    try {
      await fetch(SCRIPT_URL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({shop, phone, items: lines.join(' | '), total:'₹'+total.toFixed(2), lat, lng})
      });
      document.getElementById('successDetails').innerHTML =
        `<strong>${shop}</strong>${phone?' · '+phone:''}<br><br>${lines.join('<br>')}<br><br><strong>Total: ₹${total.toFixed(2)}</strong>`;
      document.getElementById('successOverlay').classList.add('show');
    } catch(e) {
      showError('Could not submit. Check internet connection.');
      btn.disabled = false; btn.textContent = 'Submit Order';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorBar');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => el.style.display='none', 3000);
  }

  function resetForm() {
    quantities = {};
    document.getElementById('shopName').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('successOverlay').classList.remove('show');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Submit Order';
    updateTotal();
    renderSKUs();
    renderBrands();
  }

  loadProducts();
</script>
</body>
</html>
